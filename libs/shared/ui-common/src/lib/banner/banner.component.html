<div class="banner" [class]="'banner--' + banner.type">
  <div class="banner__content">
    <span class="banner__icon">
      @switch (banner.type) {
        @case ('success') {
          <span>&#10003;</span>
        }
        @case ('error') {
          <span>&#10005;</span>
        }
        @case ('warning') {
          <span>&#9888;</span>
        }
        @case ('info') {
          <span>&#8505;</span>
        }
      }
    </span>
    <span class="banner__message">{{ banner.message }}</span>
  </div>

  @if (banner.actions && banner.actions.length > 0) {
    <div class="banner__actions">
      @for (action of banner.actions; track action.label) {
        <button class="banner__action" (click)="onActionClick(action.handler)">
          {{ action.label }}
        </button>
      }
    </div>
  }

  @if (banner.dismissible) {
    <button class="banner__dismiss" (click)="onDismiss()" aria-label="Dismiss banner">
      &times;
    </button>
  }
</div>
