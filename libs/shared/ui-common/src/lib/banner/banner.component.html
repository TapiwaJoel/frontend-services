<div
  class="mb-0 flex w-full items-center justify-between px-6 py-3 text-white"
  [ngClass]="{
    'bg-success': banner.type === 'success',
    'bg-error': banner.type === 'error',
    'bg-warning': banner.type === 'warning',
    'bg-info': banner.type === 'info',
  }"
>
  <div class="flex flex-1 items-center gap-3">
    <span
      class="bg-opacity-20 flex h-5 w-5 items-center justify-center rounded-full bg-white text-xs font-bold"
    >
      @switch (banner.type) {
        @case ('success') {
          <span>&#10003;</span>
        }
        @case ('error') {
          <span>&#10005;</span>
        }
        @case ('warning') {
          <span>&#9888;</span>
        }
        @case ('info') {
          <span>&#8505;</span>
        }
      }
    </span>
    <span class="flex-1 text-sm leading-relaxed">{{ banner.message }}</span>
  </div>

  @if (banner.actions && banner.actions.length > 0) {
    <div class="ml-4 flex gap-2">
      @for (action of banner.actions; track action.label) {
        <button
          type="button"
          class="border-opacity-30 bg-opacity-10 hover:bg-opacity-20 cursor-pointer rounded border border-white bg-white px-3 py-1.5 text-xs text-inherit transition-colors duration-200"
          (click)="onActionClick(action.handler)"
        >
          {{ action.label }}
        </button>
      }
    </div>
  }

  @if (banner.dismissible) {
    <button
      type="button"
      class="ml-4 flex h-6 w-6 cursor-pointer items-center justify-center border-0 bg-transparent p-0 text-2xl text-inherit opacity-80 transition-opacity duration-200 hover:opacity-100"
      (click)="onDismiss()"
      aria-label="Dismiss banner"
    >
      &times;
    </button>
  }
</div>
