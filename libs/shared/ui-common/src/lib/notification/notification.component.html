<div
  class="shadow-notification animate-slide-in mb-2 flex items-center justify-between rounded bg-white p-3"
  [ngClass]="{
    'border-success border-l-4': notification.type === 'success',
    'border-error border-l-4': notification.type === 'error',
    'border-warning border-l-4': notification.type === 'warning',
    'border-info border-l-4': notification.type === 'info',
  }"
>
  <div class="flex flex-1 items-center gap-3">
    <span
      class="flex h-6 w-6 items-center justify-center rounded-full text-sm font-bold"
      [ngClass]="{
        'bg-success-light text-success': notification.type === 'success',
        'bg-error-light text-error': notification.type === 'error',
        'bg-warning-light text-warning': notification.type === 'warning',
        'bg-info-light text-info': notification.type === 'info',
      }"
    >
      @switch (notification.type) {
        @case ('success') {
          <span>&#10003;</span>
        }
        @case ('error') {
          <span>&#10005;</span>
        }
        @case ('warning') {
          <span>&#9888;</span>
        }
        @case ('info') {
          <span>&#8505;</span>
        }
      }
    </span>
    <span class="flex-1 text-sm leading-relaxed">{{
      notification.message
    }}</span>
  </div>
  <button
    type="button"
    class="flex h-6 w-6 cursor-pointer items-center justify-center border-0 bg-transparent p-0 text-2xl text-gray-600 transition-colors duration-200 hover:text-gray-800"
    (click)="onDismiss()"
    aria-label="Dismiss notification"
  >
    &times;
  </button>
</div>
