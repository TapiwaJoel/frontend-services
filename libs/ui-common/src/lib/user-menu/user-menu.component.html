@if (user) {
  <div class="relative">
    <button
      type="button"
      class="hover:border-info flex cursor-pointer items-center gap-2 rounded border border-gray-300 bg-transparent px-3 py-1.5 transition-all duration-200 hover:bg-gray-100"
      (click)="toggleMenu()"
      aria-label="User menu"
    >
      @if (user.avatar) {
        <img
          [src]="user.avatar"
          [alt]="user.name"
          class="h-8 w-8 rounded-full object-cover"
        />
      } @else {
        <div
          class="bg-info flex h-8 w-8 items-center justify-center rounded-full text-sm font-semibold text-white"
        >
          {{ userInitials }}
        </div>
      }
      <span class="text-sm font-medium text-gray-800">{{ user.name }}</span>
      <span
        class="text-xs text-gray-600 transition-transform duration-200"
        [ngClass]="{ 'rotate-180': isMenuOpen }"
      >
        &#9662;
      </span>
    </button>

    @if (isMenuOpen) {
      <div
        class="fixed top-0 right-0 bottom-0 left-0 z-[999]"
        (click)="closeMenu()"
        (keydown.escape)="closeMenu()"
        tabindex="0"
        role="button"
        aria-label="Close menu"
      ></div>
      <div
        class="shadow-notification animate-dropdown-fade-in absolute top-full right-0 z-[1000] mt-1 min-w-60 rounded border border-gray-300 bg-white"
      >
        <div class="p-3">
          <div class="flex flex-col gap-1">
            <div class="text-sm font-semibold text-gray-800">
              {{ user.name }}
            </div>
            <div class="text-xs text-gray-600">{{ user.email }}</div>
          </div>
        </div>
        <div class="my-1 h-px bg-gray-100"></div>
        <button
          type="button"
          class="flex w-full cursor-pointer items-center gap-3 border-0 bg-transparent px-4 py-2.5 text-left text-sm text-gray-800 transition-colors duration-200 hover:bg-gray-100"
          (click)="onViewDevices()"
        >
          <span class="text-base">&#128241;</span>
          <span>My Devices</span>
        </button>
        <div class="my-1 h-px bg-gray-100"></div>
        <button
          type="button"
          class="text-error hover:bg-error-light flex w-full cursor-pointer items-center gap-3 border-0 bg-transparent px-4 py-2.5 text-left text-sm transition-colors duration-200"
          (click)="onLogout()"
        >
          <span class="text-base">&#x2192;</span>
          <span>Logout</span>
        </button>
      </div>
    }
  </div>
}
