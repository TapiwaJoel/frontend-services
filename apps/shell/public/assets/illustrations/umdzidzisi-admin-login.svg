<svg width="100%" viewBox="0 0 480 600" xmlns="http://www.w3.org/2000/svg">
  <title>Umdzidzisi Admin Portal</title>
  <desc>A professional classroom scene with a teacher at a chalkboard and students at desks, rendered in corporate purple tones.</desc>

  <!-- Background - Light corporate purple -->
  <rect x="0" y="0" width="480" height="600" fill="#d7d6e0"/>

  <!-- Floor -->
  <rect x="0" y="450" width="480" height="150" fill="#b8b5ca"/>

  <!-- Back wall -->
  <rect x="20" y="60" width="440" height="380" fill="#faf9fb" rx="2"/>

  <!-- Chalkboard/Whiteboard -->
  <g transform="translate(90, 80)">
    <!-- Board frame -->
    <rect x="0" y="0" width="300" height="180" rx="4" fill="#544a88"/>
    <!-- Board surface -->
    <rect x="8" y="8" width="284" height="164" rx="2" fill="#363062"/>

    <!-- umdzidzisi text on board -->
    <text
      x="150"
      y="100"
      font-family="Arial, sans-serif"
      font-size="32"
      font-weight="600"
      fill="#d7d6e0"
      text-anchor="middle">
      umdzidzisi
    </text>

    <!-- Chalk tray -->
    <rect x="0" y="180" width="300" height="8" rx="2" fill="#756d9e"/>
  </g>

  <!-- Teacher (positioned to the left of board) -->
  <g transform="translate(35, 140)">
    <!-- Head -->
    <ellipse cx="25" cy="25" rx="20" ry="22" fill="#b8b5ca"/>

    <!-- Hair -->
    <ellipse cx="25" cy="12" rx="22" ry="18" fill="#363062"/>

    <!-- Eyes -->
    <ellipse cx="18" cy="23" rx="2.5" ry="3.5" fill="#0b0a14"/>
    <ellipse cx="32" cy="23" rx="2.5" ry="3.5" fill="#0b0a14"/>
    <circle cx="18.5" cy="22" r="1" fill="#faf9fb"/>
    <circle cx="32.5" cy="22" r="1" fill="#faf9fb"/>

    <!-- Eyebrows -->
    <path d="M14 18 Q18 16 22 18" stroke="#363062" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M28 18 Q32 16 36 18" stroke="#363062" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Nose -->
    <ellipse cx="25" cy="28" rx="2" ry="3" fill="#9d9aae"/>

    <!-- Smile -->
    <path d="M18 33 Q25 37 32 33" stroke="#363062" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Neck -->
    <rect x="20" y="45" width="10" height="8" fill="#b8b5ca"/>

    <!-- Body (professional attire) -->
    <ellipse cx="25" cy="80" rx="22" ry="28" fill="#544a88"/>

    <!-- Collar -->
    <path d="M20 53 L15 65 L25 68 L20 53" fill="#faf9fb"/>
    <path d="M30 53 L35 65 L25 68 L30 53" fill="#faf9fb"/>

    <!-- Pointing arm (to the right) -->
    <ellipse cx="55" cy="70" rx="20" ry="6" fill="#544a88" transform="rotate(10 55 70)"/>
    <!-- Hand -->
    <ellipse cx="75" cy="75" rx="6" ry="5" fill="#b8b5ca"/>
    <!-- Pointer finger -->
    <ellipse cx="82" cy="75" rx="4" ry="3" fill="#b8b5ca"/>

    <!-- Other arm -->
    <ellipse cx="8" cy="75" rx="6" ry="18" fill="#544a88"/>
    <ellipse cx="6" cy="92" rx="5" ry="6" fill="#b8b5ca"/>
  </g>

  <!-- Clock on wall -->
  <g transform="translate(420, 90)">
    <circle cx="0" cy="0" r="22" fill="#faf9fb" stroke="#544a88" stroke-width="2"/>
    <circle cx="0" cy="0" r="2" fill="#544a88"/>
    <line x1="0" y1="0" x2="0" y2="-12" stroke="#544a88" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="8" y2="4" stroke="#756d9e" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Window -->
  <g transform="translate(25, 90)">
    <rect x="0" y="0" width="45" height="60" rx="3" fill="#9d9aae" stroke="#544a88" stroke-width="2"/>
    <line x1="22.5" y1="0" x2="22.5" y2="60" stroke="#544a88" stroke-width="2"/>
    <line x1="0" y1="30" x2="45" y2="30" stroke="#544a88" stroke-width="2"/>
  </g>

  <!-- Bookshelf -->
  <g transform="translate(410, 280)">
    <rect x="0" y="0" width="50" height="120" fill="#756d9e" rx="2"/>
    <!-- Shelves -->
    <line x1="0" y1="30" x2="50" y2="30" stroke="#544a88" stroke-width="2"/>
    <line x1="0" y1="60" x2="50" y2="60" stroke="#544a88" stroke-width="2"/>
    <line x1="0" y1="90" x2="50" y2="90" stroke="#544a88" stroke-width="2"/>
    <!-- Books (simple rectangles) -->
    <rect x="5" y="5" width="8" height="20" fill="#363062"/>
    <rect x="15" y="8" width="8" height="18" fill="#544a88"/>
    <rect x="25" y="6" width="8" height="20" fill="#282148"/>
    <rect x="35" y="10" width="8" height="16" fill="#3a3166"/>
  </g>

  <!-- Plant -->
  <g transform="translate(25, 380)">
    <ellipse cx="15" cy="30" rx="12" ry="8" fill="#756d9e"/>
    <ellipse cx="15" cy="20" rx="8" ry="12" fill="#544a88"/>
    <ellipse cx="8" cy="18" rx="6" ry="10" fill="#544a88"/>
    <ellipse cx="22" cy="18" rx="6" ry="10" fill="#544a88"/>
  </g>

  <!-- Desks and Students (4 students total) -->

  <!-- Back row desks -->
  <!-- Desk 1 (back left) -->
  <g transform="translate(80, 355)">
    <rect x="0" y="0" width="70" height="45" rx="3" fill="#756d9e"/>
    <rect x="5" y="5" width="60" height="8" fill="#9d9aae"/>
  </g>

  <!-- Student 1 (back left) - repositioned higher to be visible -->
  <g transform="translate(115, 345)">
    <!-- Head -->
    <ellipse cx="0" cy="0" rx="16" ry="18" fill="#b8b5ca"/>
    <!-- Hair -->
    <ellipse cx="0" cy="-10" rx="17" ry="14" fill="#363062"/>
    <!-- Eyes -->
    <ellipse cx="-5" cy="-2" rx="2" ry="2.5" fill="#0b0a14"/>
    <ellipse cx="5" cy="-2" rx="2" ry="2.5" fill="#0b0a14"/>
    <circle cx="-4.5" cy="-3" r="0.8" fill="#faf9fb"/>
    <circle cx="5.5" cy="-3" r="0.8" fill="#faf9fb"/>
    <!-- Nose -->
    <ellipse cx="0" cy="2" rx="1.5" ry="2" fill="#9d9aae"/>
    <!-- Mouth -->
    <path d="M-4 6 Q0 8 4 6" stroke="#363062" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Shoulders -->
    <ellipse cx="0" cy="22" rx="18" ry="10" fill="#544a88"/>
  </g>

  <!-- Desk 2 (back right) -->
  <g transform="translate(330, 355)">
    <rect x="0" y="0" width="70" height="45" rx="3" fill="#756d9e"/>
    <rect x="5" y="5" width="60" height="8" fill="#9d9aae"/>
  </g>

  <!-- Student 2 (back right) - repositioned higher -->
  <g transform="translate(365, 345)">
    <!-- Head -->
    <ellipse cx="0" cy="0" rx="16" ry="18" fill="#b8b5ca"/>
    <!-- Hair -->
    <ellipse cx="0" cy="-10" rx="17" ry="14" fill="#363062"/>
    <!-- Eyes -->
    <ellipse cx="-5" cy="-2" rx="2" ry="2.5" fill="#0b0a14"/>
    <ellipse cx="5" cy="-2" rx="2" ry="2.5" fill="#0b0a14"/>
    <circle cx="-4.5" cy="-3" r="0.8" fill="#faf9fb"/>
    <circle cx="5.5" cy="-3" r="0.8" fill="#faf9fb"/>
    <!-- Nose -->
    <ellipse cx="0" cy="2" rx="1.5" ry="2" fill="#9d9aae"/>
    <!-- Mouth -->
    <path d="M-4 6 Q0 7 4 6" stroke="#363062" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Shoulders -->
    <ellipse cx="0" cy="22" rx="18" ry="10" fill="#544a88"/>
  </g>

  <!-- Front row desks -->
  <!-- Desk 3 (front left) -->
  <g transform="translate(80, 460)">
    <rect x="0" y="0" width="70" height="45" rx="3" fill="#756d9e"/>
    <rect x="5" y="5" width="60" height="8" fill="#9d9aae"/>
  </g>

  <!-- Student 3 (front left - girl with hand raised) - repositioned significantly higher and enlarged -->
  <g transform="translate(115, 425)">
    <!-- Head (larger) -->
    <ellipse cx="0" cy="0" rx="18" ry="20" fill="#b8b5ca"/>

    <!-- Hair - pigtails style -->
    <ellipse cx="0" cy="-12" rx="19" ry="16" fill="#363062"/>
    <circle cx="-19" cy="-6" r="8" fill="#363062"/>
    <circle cx="19" cy="-6" r="8" fill="#363062"/>

    <!-- Eyes -->
    <ellipse cx="-6" cy="-2" rx="2.5" ry="3" fill="#0b0a14"/>
    <ellipse cx="6" cy="-2" rx="2.5" ry="3" fill="#0b0a14"/>
    <circle cx="-5.5" cy="-3" r="1" fill="#faf9fb"/>
    <circle cx="6.5" cy="-3" r="1" fill="#faf9fb"/>

    <!-- Eyebrows (expressive) -->
    <path d="M-10 -8 Q-6 -10 -2 -8" stroke="#363062" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M2 -8 Q6 -10 10 -8" stroke="#363062" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Nose -->
    <ellipse cx="0" cy="3" rx="2" ry="2.5" fill="#9d9aae"/>

    <!-- Smile (happy expression) -->
    <path d="M-6 8 Q0 12 6 8" stroke="#363062" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Shoulders/body -->
    <ellipse cx="0" cy="26" rx="20" ry="12" fill="#544a88"/>

    <!-- Raised hand (right arm up) -->
    <ellipse cx="22" cy="8" rx="6" ry="16" fill="#544a88" transform="rotate(-30 22 8)"/>
    <ellipse cx="28" cy="-8" rx="5" ry="6" fill="#b8b5ca"/>

    <!-- Other arm -->
    <ellipse cx="-18" cy="22" rx="6" ry="12" fill="#544a88"/>
    <ellipse cx="-20" cy="32" rx="5" ry="5" fill="#b8b5ca"/>
  </g>

  <!-- Desk 4 (front right) -->
  <g transform="translate(330, 460)">
    <rect x="0" y="0" width="70" height="45" rx="3" fill="#756d9e"/>
    <rect x="5" y="5" width="60" height="8" fill="#9d9aae"/>
  </g>

  <!-- Student 4 (front right - boy) - repositioned higher and enlarged -->
  <g transform="translate(365, 425)">
    <!-- Head (larger) -->
    <ellipse cx="0" cy="0" rx="18" ry="20" fill="#b8b5ca"/>

    <!-- Hair (short style) -->
    <ellipse cx="0" cy="-12" rx="19" ry="14" fill="#363062"/>

    <!-- Eyes -->
    <ellipse cx="-6" cy="-2" rx="2.5" ry="3" fill="#0b0a14"/>
    <ellipse cx="6" cy="-2" rx="2.5" ry="3" fill="#0b0a14"/>
    <circle cx="-5.5" cy="-3" r="1" fill="#faf9fb"/>
    <circle cx="6.5" cy="-3" r="1" fill="#faf9fb"/>

    <!-- Eyebrows -->
    <path d="M-10 -8 Q-6 -9 -2 -8" stroke="#363062" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M2 -8 Q6 -9 10 -8" stroke="#363062" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Nose -->
    <ellipse cx="0" cy="3" rx="2" ry="2.5" fill="#9d9aae"/>

    <!-- Neutral expression -->
    <path d="M-5 9 Q0 10 5 9" stroke="#363062" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Shoulders/body -->
    <ellipse cx="0" cy="26" rx="20" ry="12" fill="#544a88"/>

    <!-- Arms at sides -->
    <ellipse cx="-18" cy="22" rx="6" ry="12" fill="#544a88"/>
    <ellipse cx="-20" cy="32" rx="5" ry="5" fill="#b8b5ca"/>
    <ellipse cx="18" cy="22" rx="6" ry="12" fill="#544a88"/>
    <ellipse cx="20" cy="32" rx="5" ry="5" fill="#b8b5ca"/>
  </g>

  <!-- Trash bin -->
  <g transform="translate(440, 520)">
    <rect x="0" y="0" width="22" height="28" rx="2" fill="#756d9e"/>
    <rect x="2" y="2" width="18" height="4" fill="#544a88"/>
  </g>
</svg>
