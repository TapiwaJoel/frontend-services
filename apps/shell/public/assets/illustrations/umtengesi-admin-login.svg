<svg width="600" height="700" viewBox="0 0 600 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="umtengesi-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff3e0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="700" fill="url(#umtengesi-bg)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="60" fill="#4caf50" opacity="0.1"/>
  <circle cx="520" cy="600" r="80" fill="#ff9800" opacity="0.1"/>
  <circle cx="450" cy="150" r="40" fill="#4caf50" opacity="0.15"/>

  <!-- Shopping bag main -->
  <g transform="translate(200, 200)">
    <!-- Bag body -->
    <path d="M 50 80 L 20 300 Q 20 320 40 320 L 160 320 Q 180 320 180 300 L 150 80 Z"
          fill="#4caf50" opacity="0.9"/>
    <!-- Bag highlight -->
    <path d="M 50 80 L 20 300 Q 20 320 40 320 L 160 320 Q 180 320 180 300 L 150 80 Z"
          fill="none" stroke="#ffffff" stroke-width="3" opacity="0.3"/>

    <!-- Bag handles -->
    <path d="M 70 80 Q 70 40 100 40 Q 130 40 130 80"
          fill="none" stroke="#4caf50" stroke-width="8" stroke-linecap="round"/>
    <path d="M 70 80 Q 70 40 100 40 Q 130 40 130 80"
          fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>

    <!-- Tag/label -->
    <rect x="80" y="180" width="40" height="60" rx="4" fill="#ffffff" opacity="0.9"/>
    <rect x="85" y="200" width="30" height="3" rx="1" fill="#4caf50"/>
    <rect x="85" y="210" width="30" height="3" rx="1" fill="#4caf50"/>
    <rect x="85" y="220" width="20" height="3" rx="1" fill="#4caf50"/>
  </g>

  <!-- Shopping cart -->
  <g transform="translate(380, 380)">
    <!-- Cart body -->
    <path d="M 0 0 L 10 40 L 70 40 L 60 0 Z" fill="#ff9800" opacity="0.8"/>
    <line x1="0" y1="0" x2="-15" y2="0" stroke="#ff9800" stroke-width="3"/>

    <!-- Cart items -->
    <rect x="15" y="-20" width="15" height="20" rx="2" fill="#4caf50" opacity="0.7"/>
    <rect x="35" y="-25" width="15" height="25" rx="2" fill="#66bb6a" opacity="0.7"/>

    <!-- Wheels -->
    <circle cx="20" cy="50" r="6" fill="#ff9800"/>
    <circle cx="20" cy="50" r="3" fill="#ffffff"/>
    <circle cx="60" cy="50" r="6" fill="#ff9800"/>
    <circle cx="60" cy="50" r="3" fill="#ffffff"/>
  </g>

  <!-- Package/box -->
  <g transform="translate(80, 480)">
    <rect x="0" y="20" width="80" height="80" rx="4" fill="#66bb6a" opacity="0.8"/>
    <path d="M 0 20 L 40 0 L 80 20" fill="#4caf50"/>
    <path d="M 40 0 L 40 100" stroke="#ffffff" stroke-width="3" opacity="0.5"/>
    <path d="M 0 20 L 80 20" stroke="#ffffff" stroke-width="3" opacity="0.5"/>
    <path d="M 20 20 L 60 20 L 60 100 L 20 100 Z" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- Credit card -->
  <g transform="translate(420, 250)">
    <rect x="0" y="0" width="120" height="75" rx="8" fill="#4caf50" opacity="0.9"/>
    <rect x="0" y="15" width="120" height="15" fill="#2e7d32"/>
    <!-- Chip -->
    <rect x="15" y="40" width="25" height="20" rx="3" fill="#ffd700"/>
    <rect x="18" y="43" width="19" height="14" rx="2" fill="none" stroke="#2e7d32" stroke-width="1"/>
    <!-- Card details -->
    <rect x="50" y="45" width="55" height="3" rx="1" fill="#ffffff" opacity="0.5"/>
    <rect x="50" y="52" width="40" height="3" rx="1" fill="#ffffff" opacity="0.5"/>
  </g>

  <!-- Price tag -->
  <g transform="translate(90, 280)">
    <path d="M 0 0 L 50 0 L 60 25 L 50 50 L 0 50 Z" fill="#ff9800" opacity="0.8"/>
    <circle cx="15" cy="25" r="5" fill="#ffffff"/>
    <text x="30" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">%</text>
  </g>

  <!-- Coins -->
  <circle cx="450" cy="500" r="25" fill="#ffd700" opacity="0.8"/>
  <circle cx="450" cy="500" r="20" fill="none" stroke="#ff9800" stroke-width="2"/>
  <circle cx="480" cy="520" r="20" fill="#ffd700" opacity="0.7"/>
  <circle cx="480" cy="520" r="15" fill="none" stroke="#ff9800" stroke-width="2"/>

  <!-- Storefront icon -->
  <g transform="translate(470, 100)">
    <!-- Awning -->
    <path d="M 0 0 L -10 20 L 90 20 L 80 0 Z" fill="#4caf50"/>
    <rect x="-10" y="20" width="100" height="10" fill="#2e7d32"/>
    <!-- Stripes -->
    <rect x="0" y="0" width="8" height="20" fill="#ffffff" opacity="0.2"/>
    <rect x="16" y="0" width="8" height="20" fill="#ffffff" opacity="0.2"/>
    <rect x="32" y="0" width="8" height="20" fill="#ffffff" opacity="0.2"/>
    <rect x="48" y="0" width="8" height="20" fill="#ffffff" opacity="0.2"/>
    <rect x="64" y="0" width="8" height="20" fill="#ffffff" opacity="0.2"/>
    <!-- Window -->
    <rect x="0" y="30" width="35" height="40" rx="2" fill="#81c784"/>
    <rect x="45" y="30" width="35" height="40" rx="2" fill="#81c784"/>
  </g>

  <!-- Bottom text -->
  <text x="300" y="650" font-family="Arial, sans-serif" font-size="24" font-weight="600" fill="#4caf50" text-anchor="middle">
    Admin Portal
  </text>
  <text x="300" y="680" font-family="Arial, sans-serif" font-size="16" fill="#ff9800" text-anchor="middle" opacity="0.8">
    E-Commerce Management Platform
  </text>
</svg>
