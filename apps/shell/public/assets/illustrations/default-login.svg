<svg width="600" height="700" viewBox="0 0 600 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="default-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fce4ec;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="700" fill="url(#default-bg)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="60" fill="#1976d2" opacity="0.1"/>
  <circle cx="520" cy="600" r="80" fill="#ff4081" opacity="0.1"/>
  <circle cx="450" cy="150" r="40" fill="#1976d2" opacity="0.15"/>

  <!-- Main lock/shield icon -->
  <g transform="translate(250, 280)">
    <!-- Shield -->
    <path d="M 50 0 L 0 30 L 0 100 Q 0 140 50 170 Q 100 140 100 100 L 100 30 Z"
          fill="#1976d2" opacity="0.9"/>
    <path d="M 50 0 L 0 30 L 0 100 Q 0 140 50 170 Q 100 140 100 100 L 100 30 Z"
          fill="none" stroke="#ffffff" stroke-width="3" opacity="0.3"/>

    <!-- Lock body -->
    <rect x="30" y="80" width="40" height="50" rx="4" fill="#ffffff" opacity="0.9"/>
    <!-- Lock shackle -->
    <path d="M 35 80 L 35 60 Q 35 45 50 45 Q 65 45 65 60 L 65 80"
          fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="50" cy="100" r="5" fill="#1976d2"/>
    <rect x="48" y="100" width="4" height="15" rx="2" fill="#1976d2"/>
  </g>

  <!-- Bottom text -->
  <text x="300" y="650" font-family="Arial, sans-serif" font-size="24" font-weight="600" fill="#1976d2" text-anchor="middle">
    Secure Login
  </text>
  <text x="300" y="680" font-family="Arial, sans-serif" font-size="16" fill="#ff4081" text-anchor="middle" opacity="0.8">
    Admin Portal
  </text>
</svg>
