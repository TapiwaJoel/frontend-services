<div class="flex h-screen">
  <!-- Left Panel - Login Form -->
  <div class="flex w-full flex-col bg-white px-8 py-8 lg:w-1/2 lg:py-12">
    <div class="mx-auto flex w-full max-w-md flex-1 flex-col">
      <!-- Logo at top-left -->
      <div class="mr-auto mb-12">
        @if (currentLogo(); as logo) {
          <img [src]="logo" alt="Logo" class="h-16 w-auto" />
        }
      </div>

      <!-- Content area with vertical centering -->
      <div class="flex flex-1 flex-col justify-center">
        <!-- Heading -->
        <div class="mb-8">
          <h1 class="theme-primary-text mb-2 text-3xl font-bold">
            Welcome Back
          </h1>
          <p class="text-gray-600">
            @if (loginText(); as text) {
              {{ text }}
            }
          </p>
        </div>

        <!-- Login Form -->
        <form (ngSubmit)="onSubmit()" class="space-y-6">
          <div>
            <label
              for="username"
              class="mb-2 block text-sm font-medium text-gray-700"
            >
              Email Address
            </label>
            <input
              type="email"
              id="username"
              name="username"
              [(ngModel)]="username"
              required
              placeholder="admin@example.com"
              class="theme-primary-ring w-full rounded-lg border border-gray-300 px-4 py-3 transition-all focus:ring-2 focus:outline-none"
            />
          </div>

          <div>
            <label
              for="password"
              class="mb-2 block text-sm font-medium text-gray-700"
            >
              Password
            </label>
            <input
              type="password"
              id="password"
              name="password"
              [(ngModel)]="password"
              required
              placeholder="Enter your password"
              class="theme-primary-ring w-full rounded-lg border border-gray-300 px-4 py-3 transition-all focus:ring-2 focus:outline-none"
            />
          </div>

          <div class="flex items-center justify-between text-sm">
            <div class="flex items-center">
              <input
                type="checkbox"
                id="remember"
                class="theme-primary-accent h-4 w-4 rounded border-gray-300"
              />
              <label for="remember" class="ml-2 text-gray-600">
                Remember me
              </label>
            </div>
            <a href="#" class="theme-primary-link font-medium">
              Forgot password?
            </a>
          </div>

          <button
            type="submit"
            class="theme-primary-bg w-full rounded-lg px-4 py-3 font-semibold text-white shadow-md transition-all duration-200 hover:opacity-90 hover:shadow-lg"
          >
            Sign In
          </button>
        </form>

        <!-- Footer Note -->
        <div class="mt-8 text-center text-sm text-gray-500">
          <p>Admin access only. Contact your administrator for credentials.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Panel - Illustration -->
  <div class="theme-bg relative hidden h-full p-0 lg:block lg:w-1/2">
    @if (currentIllustration(); as illustration) {
      <img
        [src]="illustration"
        alt="Login Illustration"
        class="absolute inset-0 h-full w-full object-cover"
      />
    }
  </div>
</div>
