<div class="flex h-screen">
  <!-- Left Panel - Login Form -->
  <div
    class="flex w-full flex-col bg-gray-50 px-6 py-8 md:w-1/2 md:bg-white md:px-12 md:py-10 lg:py-12"
  >
    <div
      class="mx-auto flex w-full max-w-md flex-1 flex-col rounded-2xl bg-white p-8 shadow-md md:max-w-lg md:rounded-none md:bg-transparent md:p-0 md:shadow-none lg:max-w-md"
    >
      <!-- Logo at top-left -->
      <div class="mx-auto mb-16 md:mx-0 md:mr-auto md:mb-10 lg:mb-12">
        @if (currentLogo(); as logo) {
          <img [src]="logo" alt="Logo" class="h-20 w-auto md:h-16" />
        }
      </div>

      <!-- Content area with vertical centering -->
      <div class="flex flex-1 flex-col justify-center">
        <!-- Heading -->
        <div class="mb-8 md:mb-8">
          <h1
            class="theme-primary-text mb-3 text-2xl font-bold tracking-tight md:text-3xl"
          >
            Welcome Back
          </h1>
          <p class="text-sm text-gray-600 md:text-base">
            @if (loginText(); as text) {
              {{ text }}
            }
          </p>
        </div>

        <!-- Login Form -->
        <form (ngSubmit)="onSubmit()" class="space-y-5 md:space-y-6">
          <div>
            <label
              for="username"
              class="mb-2 block text-sm font-medium text-gray-700"
            >
              Email Address
            </label>
            <input
              type="email"
              id="username"
              name="username"
              [(ngModel)]="username"
              required
              placeholder="admin@example.com"
              class="theme-primary-ring w-full rounded-lg border border-gray-300 px-3 py-2 transition-all focus:ring-2 focus:outline-none md:px-4 md:py-3"
            />
          </div>

          <div>
            <label
              for="password"
              class="mb-2 block text-sm font-medium text-gray-700"
            >
              Password
            </label>
            <input
              type="password"
              id="password"
              name="password"
              [(ngModel)]="password"
              required
              placeholder="Enter your password"
              class="theme-primary-ring w-full rounded-lg border border-gray-300 px-3 py-2 transition-all focus:ring-2 focus:outline-none md:px-4 md:py-3"
            />
          </div>

          <div class="flex items-center justify-between text-sm">
            <div class="flex items-center">
              <input
                type="checkbox"
                id="remember"
                class="theme-primary-accent h-4 w-4 rounded border-gray-300"
              />
              <label for="remember" class="ml-2 text-gray-600">
                Remember me
              </label>
            </div>
            <a href="#" class="theme-primary-link font-medium">
              Forgot password?
            </a>
          </div>

          <button
            type="submit"
            class="theme-primary-bg w-full rounded-lg px-4 py-3 font-semibold text-white shadow-md transition-all duration-200 hover:opacity-90 hover:shadow-lg md:py-3"
          >
            Sign In
          </button>
        </form>

        <!-- Footer Note -->
        <div class="mt-6 text-center text-xs text-gray-500 md:mt-8 md:text-sm">
          <p>Admin access only. Contact your administrator for credentials.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Panel - Illustration -->
  <div class="theme-bg relative hidden h-full p-0 md:block md:w-1/2">
    @if (currentIllustration(); as illustration) {
      <img
        [src]="illustration"
        alt="Login Illustration"
        class="absolute inset-0 h-full w-full object-contain"
      />
    }
  </div>
</div>
